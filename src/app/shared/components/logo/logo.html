<div class="flex items-center gap-3">
  <svg
    viewBox="-50 -56 100 112"
    [attr.width]="size"
    [attr.height]="size"
    fill="none"
  >
    <!-- Main Sacred Triangle -->

    <polygon
      points="0,-48 41.6,24 -41.6,24"
      stroke="var(--color-primary)"
      stroke-width="3"
      fill="none"
    />

    <!-- Inverted Triangle -->

    <polygon
      points="0,48 -41.6,-24 41.6,-24"
      stroke="var(--color-foreground)"
      stroke-width="3"
      fill="none"
      opacity="0.35"
    />

    <!-- Inner Triangle -->

    <polygon
      points="0,-22 19.1,11 -19.1,11"
      stroke="var(--color-primary-hover)"
      stroke-width="1.1"
      fill="none"
      opacity="0.85"
    />

    <!-- Primary Nodes -->

    <circle
      cx="0"
      cy="-48"
      r="2.4"
      fill="var(--color-primary)"
    />

    <circle
      cx="41.6"
      cy="24"
      r="2.4"
      fill="var(--color-primary)"
    />

    <circle
      cx="-41.6"
      cy="24"
      r="2.4"
      fill="var(--color-primary)"
    />

    <!-- Secondary Nodes -->

    <circle
      cx="0"
      cy="48"
      r="1.6"
      fill="var(--color-foreground)"
      opacity="0.35"
    />

    <circle
      cx="-41.6"
      cy="-24"
      r="1.6"
      fill="var(--color-foreground)"
      opacity="0.35"
    />

    <circle
      cx="41.6"
      cy="-24"
      r="1.6"
      fill="var(--color-foreground)"
      opacity="0.35"
    />

    <!-- Energy Rings -->

    <circle
      cx="0"
      cy="0"
      r="8"
      fill="none"
      stroke="var(--color-primary)"
      opacity="0.08"
    />

    <circle
      cx="0"
      cy="0"
      r="5"
      fill="none"
      stroke="var(--color-primary)"
      opacity="0.15"
    />

    <!-- Core -->

    <circle
      cx="0"
      cy="0"
      r="2.8"
      fill="var(--color-primary-hover)"
    />
  </svg>

  <div class="flex flex-col leading-none">
    <span
      class="
        font-heading
        text-lg
        font-medium
        tracking-[0.32em]
        text-foreground
      "
    >
      SHRIUM
    </span>

    <span
      class="
        mt-1
        text-[9px]
        uppercase
        tracking-[0.42em]
        text-primary/80
      "
    >
      Sacred Technology
    </span>
  </div>
</div>
