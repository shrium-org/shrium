<section class="variants-section">

  <div class="section-label">
    03 — Logo Variants
  </div>

  <h2 class="section-title">
    Logo System
  </h2>

  <div class="variants-grid">

    <div class="variant-card">

      <div class="variant-header">
        <h3>Primary Dark</h3>
        <span>Preferred</span>
      </div>

      <div class="preview dark">
        <app-logo [size]="50"></app-logo>

        <div class="wordmark">
          <div class="brand">
            <span class="accent">S</span>hrium
          </div>

          <div class="sub">
            Technologies
          </div>
        </div>
      </div>

      <button class="download-btn">
        Download SVG
      </button>

    </div>

    <div class="variant-card">

      <div class="variant-header">
        <h3>Primary Light</h3>
        <span>Light Background</span>
      </div>

      <div class="preview light">
        <app-logo [size]="50"></app-logo>

        <div class="wordmark light-text">
          <div class="brand">
            <span class="accent">S</span>hrium
          </div>

          <div class="sub">
            Technologies
          </div>
        </div>
      </div>

      <button class="download-btn">
        Download SVG
      </button>

    </div>

    <div class="variant-card">

      <div class="variant-header">
        <h3>Icon Mark</h3>
        <span>Standalone</span>
      </div>

      <div class="preview transparent">

        <app-logo [size]="80"></app-logo>

      </div>

      <button class="download-btn">
        Download SVG
      </button>

    </div>

  </div>

</section>
