<!-- symbol.component.html -->
<section id="symbol" class="mb-16">

  <div class="flex items-center gap-4 mb-8">
    <span class="text-mono">05</span>
    <h2 class="font-heading text-3xl font-semibold tracking-wide whitespace-nowrap"
        style="color:var(--color-foreground)">
      The Meaning Behind the Mark
    </h2>
    <div class="divider"></div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    @for (s of symbols; track s.title) {
      <div class="card card-accent-left p-6 cursor-default">

        <div class="w-11 h-11 rounded-lg flex items-center justify-center mb-5"
             style="background:var(--color-primary-dim);border:1px solid var(--color-primary-border)">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
            @switch (s.key) {
              @case ('shiva') {
                <polygon points="12,3 22,20 2,20"
                         stroke="#c8841a" stroke-width="1.5" stroke-linejoin="miter"/>
              }
              @case ('shakti') {
                <polygon points="12,21 22,4 2,4"
                         stroke="#c8841a" stroke-width="1.5" stroke-linejoin="miter" opacity=".55"/>
              }
              @case ('product') {
                <polygon points="12,6 19,18 5,18"
                         stroke="#c8841a" stroke-width="1.5" stroke-linejoin="miter" opacity=".82"/>
              }
              @case ('bindu') {
                <circle cx="12" cy="12" r="4" fill="#c8841a"/>
                <circle cx="12" cy="12" r="7" fill="none" stroke="#c8841a" stroke-width="1" opacity=".3"/>
              }
            }
          </svg>
        </div>

        <h3 class="text-sm font-medium tracking-wide mb-3"
            style="color:var(--color-foreground)">
          {{ s.title }}
        </h3>

        <p class="text-sm leading-relaxed"
           style="color:var(--color-foreground-muted)">
          {{ s.description }}
        </p>

      </div>
    }
  </div>

  <div class="flex items-center justify-between flex-wrap gap-4 mt-10 pt-6"
       style="border-top:1px solid var(--color-border)">
    <div class="flex items-center gap-6 flex-wrap">
      <div class="flex items-center gap-2">
        <div class="h-px w-5" style="background:var(--color-primary)"></div>
        <span class="label-section">Shiva</span>
      </div>
      <div class="flex items-center gap-2">
        <div class="h-px w-5" style="background:var(--color-foreground-subtle)"></div>
        <span class="label-section">Shakti</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full" style="background:var(--color-primary)"></span>
        <span class="label-section">Bindu</span>
      </div>
    </div>
    <span class="label-section opacity-50">Bengaluru · India</span>
  </div>

</section>
