<!-- skills.component.html -->
<section id="skills" class="mb-16">

  <!-- Section header -->
  <div class="flex items-center gap-4 mb-8">
    <span class="text-mono">01</span>
    <h2 class="font-heading text-3xl font-semibold tracking-wide whitespace-nowrap"
        style="color:var(--color-foreground)">
      Technical Skills
    </h2>
    <div class="divider"></div>
  </div>

  <!-- Legend -->
  <div class="flex items-center gap-5 mb-6 pl-1">
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 rounded-full"
            style="background:var(--color-primary)"></span>
      <span class="text-xs" style="color:var(--color-foreground-subtle)">Primary stack</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 rounded-full"
            style="background:var(--color-border-strong)"></span>
      <span class="text-xs" style="color:var(--color-foreground-subtle)">Proficient</span>
    </div>
  </div>

  <!-- Skill groups grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (group of data.skillGroups; track group.label) {

      <div class="card p-5 hover:border-border-strong transition-colors duration-200">

        <!-- Group header -->
        <div class="flex items-center gap-3 mb-4">
          <div class="w-9 h-9 shrink-0 rounded-lg flex items-center justify-center"
               style="background:var(--color-primary-dim);border:1px solid var(--color-primary-border)">
            <i [class]="group.icon + ' text-lg'"
               style="color:var(--color-primary)"
               aria-hidden="true"></i>
          </div>
          <span class="label-section">{{ group.label }}</span>
        </div>

        <!-- Skills -->
        <div class="flex flex-wrap gap-1.5">
          @for (skill of group.skills; track skill) {

            @if (isPrimary(skill)) {
              <span class="px-2.5 py-1 rounded text-mono text-[12px] font-semibold border flex items-center gap-1.5"
                    [ngClass]="getPrimaryClass(skill)">
                <i [class]="getPrimaryIcon(skill) + ' text-[11px]'"
                   aria-hidden="true"></i>
                {{ skill }}
              </span>
            } @else if (isSecondary(skill)) {
              <span class="px-2.5 py-1 rounded text-mono text-[12px] font-medium"
                    style="background:var(--color-surface-3);border:1px solid var(--color-border-strong);color:var(--color-foreground)">
                {{ skill }}
              </span>
            } @else {
              <span class="px-2.5 py-1 rounded text-mono text-[12px]"
                    style="background:var(--color-surface-3);border:1px solid var(--color-border);color:var(--color-foreground-muted)">
                {{ skill }}
              </span>
            }

          }
        </div>

      </div>
    }
  </div>

</section>
