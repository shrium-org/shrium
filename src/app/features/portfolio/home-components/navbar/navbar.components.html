<!-- navbar.component.html -->
<nav class="navbar fixed top-0 left-0 right-0 z-50 ">
  <div class=" mx-auto px-6 h-16 flex items-center justify-between max-w-5xl ">

    <!-- Logo -->
    <span class="font-heading text-xl tracking-wide"
          style="color:var(--color-primary)">
      AM.
    </span>

    <!-- Nav links -->
    <div class="hidden md:flex items-center gap-8">
      @for (link of navLinks; track link.label) {
        <a [href]="link.href"
           class="nav-link text-xs font-medium tracking-widest uppercase transition-colors duration-200"
           style="color:var(--color-foreground-muted)">
          {{ link.label }}
        </a>
      }
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3">
      <app-theme-toggle />
      <a href="assets/Ajay_Malah_Resume.pdf"
         download
         class="btn btn-outline">
        <i class="ti ti-download text-sm" aria-hidden="true"></i>
        Download CV
      </a>
    </div>

  </div>
</nav>
